name: Update Profile README

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.README_BOT_APP_ID }}
          private-key: ${{ secrets.README_BOT_APP_PRIVATE_KEY }}
          owner: agilusdiagnostics

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: agilusdiagnostics
          GITHUB_USER: mohitagilus700
        run: python3 scripts/update-readme.py

      - name: Commit and push
        run: |
          git config user.name "readme-bot[bot]"
          git config user.email "readme-bot[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update profile README"
          git push
